<!doctype html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calibration — style de densité</title>
<style>
  html, body { margin: 0; padding: 0; background: #05050a; color: #eee; font-family: system-ui, sans-serif; height: 100%; overflow: hidden; }
  .wrap { padding: 8px 10px; display: flex; flex-direction: column; height: 100dvh; box-sizing: border-box; }
  h1 { font-size: 11px; font-weight: 600; margin: 0 0 6px; color: #ccc; }
  .mainview { width: 52%; margin: 0 auto; }
  .mainview canvas { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 6px; display: block; }
  .layerRow { display: flex; gap: 6px; justify-content: center; margin-top: 6px; }
  .layerRow button { background: transparent; border: 1px solid #333; color: #999; border-radius: 5px; padding: 3px 8px; font-size: 10px; }
  .layerRow button.active { background: #2a2a3a; color: #fff; }
  .controls { margin-top: 8px; flex: 1; overflow: hidden; display: flex; flex-direction: column; gap: 4px; }
  .ctrl { display: flex; align-items: center; gap: 6px; }
  .ctrl label { font-size: 9.5px; color: #bbb; width: 130px; flex-shrink: 0; line-height: 1.15; }
  .ctrl input[type=range] { flex: 1; height: 18px; }
  .ctrl .val { font-size: 9.5px; color: #7fd1ff; width: 30px; flex-shrink: 0; text-align: right; font-family: monospace; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Calibration du style de densité — filaments / halo / points</h1>

  <div class="mainview">
    <canvas id="canvas" width="384" height="384"></canvas>
  </div>
  <div class="layerRow">
    <button data-layer="l2">L2</button>
    <button data-layer="l3" class="active">L3</button>
    <button data-layer="l4">L4</button>
    <button data-layer="l5">L5</button>
  </div>

  <div class="controls">
    <div class="ctrl">
      <label>Contraste (gamma)</label>
      <input type="range" id="gammaSlider" min="0.4" max="2.5" step="0.05" value="1.0" />
      <span class="val" id="gammaVal">1.00</span>
    </div>
    <div class="ctrl">
      <label>Adoucissement (vapeur)</label>
      <input type="range" id="softSlider" min="0" max="8" step="0.2" value="0" />
      <span class="val" id="softVal">0.0</span>
    </div>
    <div class="ctrl">
      <label>Netteté filaments</label>
      <input type="range" id="sharpSlider" min="0" max="3" step="0.05" value="0" />
      <span class="val" id="sharpVal">0.00</span>
    </div>
    <div class="ctrl">
      <label>Halo (bloom)</label>
      <input type="range" id="haloSlider" min="0" max="2" step="0.05" value="0.5" />
      <span class="val" id="haloVal">0.50</span>
    </div>
    <div class="ctrl">
      <label>Points lumineux (intensité)</label>
      <input type="range" id="pointIntSlider" min="0" max="3" step="0.05" value="0" />
      <span class="val" id="pointIntVal">0.00</span>
    </div>
    <div class="ctrl">
      <label>Points lumineux (seuil)</label>
      <input type="range" id="pointThreshSlider" min="80" max="99.5" step="0.5" value="97" />
      <span class="val" id="pointThreshVal">97.0</span>
    </div>
    <div class="ctrl">
      <label>Points lumineux (taille)</label>
      <input type="range" id="pointSizeSlider" min="1" max="8" step="0.5" value="3" />
      <span class="val" id="pointSizeVal">3.0</span>
    </div>
  </div>
</div>

<script>
const N = 256;

const ASTRO_STOPS = [
  [0,0,0], [0x17,0x0a,0x05], [0x4a,0x1f,0x0a], [0xa8,0x48,0x0f], [0xe8,0xa1,0x3a], [0xff,0xf3,0xd6]
];
function colorForValue(t) {
  t = Math.min(Math.max(t,0),1);
  const n = ASTRO_STOPS.length - 1;
  const idx = Math.min(Math.floor(t*n), n-1);
  const frac = t*n - idx;
  const a = ASTRO_STOPS[idx], b = ASTRO_STOPS[idx+1];
  return [a[0]+(b[0]-a[0])*frac, a[1]+(b[1]-a[1])*frac, a[2]+(b[2]-a[2])*frac];
}

let rawValues = {};
let currentLayer = 'l3';

function loadLayer(key) {
  if (rawValues[key]) { draw(); return; }
  const img = new Image();
  img.src = `data/density_${key}.png`;
  img.onload = () => {
    const off = document.createElement('canvas');
    off.width = N; off.height = N;
    const octx = off.getContext('2d');
    octx.drawImage(img, 0, 0, N, N);
    const gray = octx.getImageData(0,0,N,N);
    const values = new Float32Array(N*N);
    for (let i=0;i<N*N;i++) values[i] = gray.data[i*4]/255;
    rawValues[key] = values;
    draw();
  };
}

function boxBlur(src, w, h, radius) {
  if (radius < 0.5) return Float32Array.from(src);
  const r = Math.round(radius);
  const tmp = new Float32Array(w*h);
  const out = new Float32Array(w*h);
  for (let y=0;y<h;y++){
    let sum=0, count=0;
    for (let x=-r;x<=r;x++){ const xi=Math.min(Math.max(x,0),w-1); sum+=src[y*w+xi]; count++; }
    for (let x=0;x<w;x++){
      tmp[y*w+x]=sum/count;
      const xOut=Math.min(Math.max(x-r,0),w-1), xIn=Math.min(Math.max(x+r+1,0),w-1);
      sum += src[y*w+xIn] - src[y*w+xOut];
    }
  }
  for (let x=0;x<w;x++){
    let sum=0, count=0;
    for (let y=-r;y<=r;y++){ const yi=Math.min(Math.max(y,0),h-1); sum+=tmp[yi*w+x]; count++; }
    for (let y=0;y<h;y++){
      out[y*w+x]=sum/count;
      const yOut=Math.min(Math.max(y-r,0),h-1), yIn=Math.min(Math.max(y+r+1,0),h-1);
      sum += tmp[yIn*w+x] - tmp[yOut*w+x];
    }
  }
  return out;
}

function detectPeaks(values, w, h, thresholdPercentile, minDistPx) {
  const sorted = Float32Array.from(values).sort();
  const thresholdVal = sorted[Math.floor(sorted.length * thresholdPercentile/100)];
  const candidates = [];
  for (let y=1;y<h-1;y++){
    for (let x=1;x<w-1;x++){
      const v = values[y*w+x];
      if (v < thresholdVal) continue;
      let isMax = true;
      for (let dy=-1;dy<=1 && isMax;dy++){
        for (let dx=-1;dx<=1;dx++){
          if (dx===0 && dy===0) continue;
          if (values[(y+dy)*w+(x+dx)] > v) { isMax=false; break; }
        }
      }
      if (isMax) candidates.push({x,y,v});
    }
  }
  candidates.sort((a,b)=>b.v-a.v);
  const selected = [];
  for (const c of candidates) {
    let tooClose = false;
    for (const s of selected) {
      const d2 = (c.x-s.x)**2 + (c.y-s.y)**2;
      if (d2 < minDistPx*minDistPx) { tooClose = true; break; }
    }
    if (!tooClose) selected.push(c);
    if (selected.length > 300) break;
  }
  return selected;
}

function draw() {
  const values = rawValues[currentLayer];
  if (!values) return;

  const gamma = parseFloat(document.getElementById('gammaSlider').value);
  const soft = parseFloat(document.getElementById('softSlider').value);
  const sharp = parseFloat(document.getElementById('sharpSlider').value);
  const halo = parseFloat(document.getElementById('haloSlider').value);
  const pointInt = parseFloat(document.getElementById('pointIntSlider').value);
  const pointThresh = parseFloat(document.getElementById('pointThreshSlider').value);
  const pointSize = parseFloat(document.getElementById('pointSizeSlider').value);

  let field = soft > 0.05 ? boxBlur(values, N, N, soft) : Float32Array.from(values);

  if (sharp > 0.01) {
    const blurred = boxBlur(field, N, N, 2.5);
    for (let i=0;i<field.length;i++) field[i] = field[i] + sharp*(field[i]-blurred[i]);
  }

  let vmin=Infinity, vmax=-Infinity;
  for (let i=0;i<field.length;i++){ if(field[i]<vmin)vmin=field[i]; if(field[i]>vmax)vmax=field[i]; }
  const span = (vmax-vmin)||1;
  const normed = new Float32Array(field.length);
  for (let i=0;i<field.length;i++) normed[i] = Math.pow(Math.min(Math.max((field[i]-vmin)/span,0),1), 1/gamma);

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const tmp = document.createElement('canvas'); tmp.width=N; tmp.height=N;
  const tctx = tmp.getContext('2d');
  const out = tctx.createImageData(N,N);
  for (let i=0;i<normed.length;i++){
    const [r,g,b] = colorForValue(normed[i]);
    out.data[i*4]=r; out.data[i*4+1]=g; out.data[i*4+2]=b; out.data[i*4+3]=255;
  }
  tctx.putImageData(out,0,0);

  if (halo > 0.02) {
    const bright = new Float32Array(normed.length);
    for (let i=0;i<normed.length;i++) bright[i] = Math.max(normed[i]-0.55,0)*2.2;
    const bloomed = boxBlur(bright, N, N, 6);
    const bloomCanvas = document.createElement('canvas'); bloomCanvas.width=N; bloomCanvas.height=N;
    const bctx = bloomCanvas.getContext('2d');
    const bout = bctx.createImageData(N,N);
    for (let i=0;i<bloomed.length;i++){
      const v = Math.min(bloomed[i]*halo,1);
      const [r,g,b] = colorForValue(Math.min(normed[i]+v,1));
      bout.data[i*4]=r; bout.data[i*4+1]=g; bout.data[i*4+2]=b; bout.data[i*4+3]=v*255;
    }
    bctx.putImageData(bout,0,0);
    tctx.drawImage(bloomCanvas,0,0);
  }

  if (pointInt > 0.02) {
    const peaks = detectPeaks(normed, N, N, pointThresh, pointSize*1.5);
    for (const p of peaks) {
      const [r,g,b] = colorForValue(1);
      const grad = tctx.createRadialGradient(p.x,p.y,0,p.x,p.y,pointSize);
      grad.addColorStop(0, `rgba(${r},${g},${b},${Math.min(pointInt,1)})`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
      tctx.fillStyle = grad;
      tctx.beginPath();
      tctx.arc(p.x,p.y,pointSize,0,Math.PI*2);
      tctx.fill();
    }
  }

  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(tmp, 0, 0, canvas.width, canvas.height);
}

document.querySelectorAll('.layerRow button').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.layerRow button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentLayer = btn.dataset.layer;
    loadLayer(currentLayer);
  });
});

function bind(id, labelId, digits) {
  const el = document.getElementById(id);
  const label = document.getElementById(labelId);
  el.addEventListener('input', () => {
    label.textContent = parseFloat(el.value).toFixed(digits);
    draw();
  });
}
bind('gammaSlider','gammaVal',2);
bind('softSlider','softVal',1);
bind('sharpSlider','sharpVal',2);
bind('haloSlider','haloVal',2);
bind('pointIntSlider','pointIntVal',2);
bind('pointThreshSlider','pointThreshVal',1);
bind('pointSizeSlider','pointSizeVal',1);

loadLayer(currentLayer);
</script>
</body>
</html>
